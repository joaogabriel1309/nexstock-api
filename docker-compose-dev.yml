services:
  postgres:
    image: postgres:17-alpine
    container_name: nexstock-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexstockdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexstockdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexstock-net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nexstock-pgadmin-dev
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nexstock.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexstock-net

networks:
  nexstock-net:
    driver: bridge

volumes:
  postgres_dev_data: