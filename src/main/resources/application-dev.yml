spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/nexstockdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: NexStockPool-Dev
      maximum-pool-size: 5
      minimum-idle: 2

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

springdoc:
  swagger-ui:
    enabled: true

logging:
  level:
    com.nexstock: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.flywaydb: INFO
    org.springframework.web: DEBUG