spring:
  application:
    name: nexstock

  datasource:
    url: jdbc:postgresql://localhost:5432/nexstockdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

    hikari:
      pool-name: NexStockPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    time-zone: UTC

server:
  port: 8081
  servlet:
    context-path: /

logging:
  level:
    com.nexstock: DEBUG
    org.flywaydb: INFO
    org.hibernate.SQL: DEBUG
