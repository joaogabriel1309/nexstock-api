spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: dGVzdGUtc2VjcmV0LWNoYXZlLXBhcmEtdGVzdGVzLW5leHN0b2NrLWFwaS10ZXN0ZQ==
  expiracao-ms: 86400000

app:
  storage:
    max-file-size: 1MB
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp
    s3:
      bucket: nexstock-test
      region: us-east-2
      public-base-url: https://cdn.test.local
      product-images-prefix: produtos-test

logging:
  level:
    root: WARN
    org.flywaydb: WARN
