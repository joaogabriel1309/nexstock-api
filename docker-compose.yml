services:

  # ---------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: nexstock-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-nexstockdb}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-nexstockdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------
  # NexStock API
  # ---------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexstock-api
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-nexstockdb}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: