services:

  # ---------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: nexstock-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-nexstockdb}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-nexstockdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------
  # NexStock API
  # ---------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexstock-api
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-nexstockdb}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRACAO_MS: ${JWT_EXPIRACAO_MS:-86400000}
      AWS_REGION: ${AWS_REGION:-sa-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-nexstock-dev}
      AWS_S3_PRODUCT_IMAGES_PREFIX: ${AWS_S3_PRODUCT_IMAGES_PREFIX:-produtos}
      AWS_S3_PUBLIC_BASE_URL: ${AWS_S3_PUBLIC_BASE_URL:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      UPLOAD_MAX_FILE_SIZE: ${UPLOAD_MAX_FILE_SIZE:-5MB}
      UPLOAD_MAX_REQUEST_SIZE: ${UPLOAD_MAX_REQUEST_SIZE:-6MB}
      STORAGE_MAX_FILE_SIZE: ${STORAGE_MAX_FILE_SIZE:-5MB}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
